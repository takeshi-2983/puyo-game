<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぷよぷよ風ゲーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

  :root {
    --red: #FF4757;
    --blue: #2ED573;
    --green: #1E90FF;
    --yellow: #FFD700;
    --purple: #C44DFF;
    --bg: #0D0D2B;
    --panel: #16163A;
    --cell: #1a1a3e;
    --cell-border: #2a2a5e;
    --text: #ffffff;
    --shadow-glow: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    background: var(--stage-bg, #0D0D2B);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100dvh;
    overflow: hidden;
    transition: background 0.8s ease;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--stage-grad);
    z-index: 0;
    transition: background 0.8s ease;
    pointer-events: none;
  }
  #header, #stage-bar-wrap, #main, #controls { position: relative; z-index: 1; }

  #header {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px 4px;
    flex-shrink: 0;
  }

  .score-box {
    background: var(--panel);
    border-radius: 12px;
    padding: 4px 10px;
    text-align: center;
    border: 1px solid var(--cell-border);
  }

  .score-label {
    font-size: 9px;
    color: #8888cc;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 18px;
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 0 12px #FFD70088;
    line-height: 1.1;
  }

  #title {
    font-size: 17px;
    font-weight: 900;
    background: linear-gradient(135deg, #FF4757, #C44DFF, #1E90FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ステージバー */
  #stage-bar-wrap {
    width: 100%;
    max-width: 480px;
    padding: 0 12px 3px;
    flex-shrink: 0;
  }
  #stage-bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  #stage-label {
    font-size: 10px;
    font-weight: 800;
    color: #aaaaee;
    letter-spacing: 0.5px;
  }
  #stage-goal-label {
    font-size: 10px;
    font-weight: 800;
    color: #aaaaee;
  }
  #stage-bar-bg {
    background: #1a1a40;
    border-radius: 6px;
    height: 8px;
    border: 1px solid #2a2a60;
    overflow: hidden;
  }
  #stage-bar-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, #2ED573, #FFD700);
    transition: width 0.3s ease, background 0.5s;
    width: 0%;
  }

  /* メインエリア：残り高さをすべて使う */
  #main {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    padding: 0 8px;
    width: 100%;
    max-width: 480px;
    flex: 1;
    min-height: 0;
  }

  #board-wrap {
    flex: 1;
    position: relative;
    height: 100%;
    display: flex;
    align-items: flex-start;
  }

  canvas#gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    border: 2px solid var(--cell-border);
    box-shadow: 0 0 20px rgba(100,100,255,0.15);
  }

  #side-panel {
    width: 64px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-top: 2px;
    height: 100%;
  }

  .side-box {
    background: var(--panel);
    border-radius: 10px;
    border: 1px solid var(--cell-border);
    padding: 5px 4px;
    text-align: center;
  }

  .side-label {
    font-size: 8px;
    color: #8888cc;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 3px;
    text-transform: uppercase;
  }

  canvas#nextCanvas {
    display: block;
    margin: 0 auto;
  }

  #level-val {
    font-size: 22px;
    font-weight: 900;
    color: #2ED573;
    text-shadow: 0 0 12px #2ED57388;
  }

  #chain-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 36px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 20px #FFD700, 0 0 40px #FF8C00;
    pointer-events: none;
    transition: all 0.1s;
    z-index: 10;
    white-space: nowrap;
  }

  /* コントロール */
  #controls {
    width: 100%;
    max-width: 480px;
    padding: 4px 10px 8px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn {
    background: var(--panel);
    border: 2px solid var(--cell-border);
    border-radius: 12px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    padding: 10px 0;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:active {
    background: #2a2a5e;
    transform: scale(0.94);
    border-color: #5555aa;
  }

  .btn-rotate {
    font-size: 18px;
    background: linear-gradient(135deg, #1a1a4e, #2a1a5e);
    border-color: #6644aa;
  }

  .btn-drop {
    font-size: 18px;
    background: linear-gradient(135deg, #1a3a1a, #1a4a2a);
    border-color: #44aa66;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: 40px;
    font-weight: 900;
    background: linear-gradient(135deg, #FF4757, #FFD700, #2ED573);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .overlay-score {
    font-size: 20px;
    color: #ccccff;
    margin-bottom: 6px;
    font-weight: 800;
  }

  .overlay-hi {
    font-size: 15px;
    color: #FFD700;
    margin-bottom: 28px;
    font-weight: 700;
  }

  .start-btn {
    background: linear-gradient(135deg, #FF4757, #C44DFF);
    border: none;
    border-radius: 18px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    padding: 16px 48px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(196,77,255,0.5);
    transition: all 0.15s;
  }

  .start-btn:active { transform: scale(0.96); }

  .rules {
    margin-top: 20px;
    color: #8888cc;
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
    font-weight: 700;
  }

  /* パーティクル */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
  }

  #pauseBtn {
    background: var(--panel);
    border: 2px solid var(--cell-border);
    border-radius: 12px;
    color: #aaaadd;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }

  #pauseBtn:active { transform: scale(0.93); background: #2a2a5e; }
  #pauseBtn.paused { color: #2ED573; border-color: #2ED573; text-shadow: 0 0 10px #2ED57388; }

  #pause-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,40,0.82);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9;
    backdrop-filter: blur(3px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  #pause-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #pause-overlay .pause-text {
    font-size: 36px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(100,100,255,0.8);
  }

  #pause-overlay .pause-sub {
    font-size: 13px;
    color: #8888cc;
    margin-top: 8px;
    font-weight: 700;
  }

  /* ===== ステージクリアオーバーレイ ===== */
  #stage-clear-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #stage-clear-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .stage-clear-title {
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FF4757, #C44DFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 6px;
  }
  .stage-next-info {
    font-size: 18px;
    color: #ccccff;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .stage-next-theme {
    font-size: 32px;
    margin-bottom: 20px;
  }
  .stage-next-btn {
    background: linear-gradient(135deg, #2ED573, #1E90FF);
    border: none;
    border-radius: 18px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    padding: 14px 44px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(46,213,115,0.4);
    transition: all 0.15s;
  }
  .stage-next-btn:active { transform: scale(0.96); }

  @keyframes popIn {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* 全クリア */
  .all-clear-title {
    font-size: 40px;
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FF4757, #C44DFF, #2ED573);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    text-align: center;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div id="header">
  <div class="score-box">
    <div class="score-label">スコア</div>
    <div class="score-value" id="scoreVal">0</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
    <div id="title">ぷよポップ！</div>
    <button id="pauseBtn">⏸ ポーズ</button>
  </div>
  <div class="score-box">
    <div class="score-label">ハイスコア</div>
    <div class="score-value" id="hiVal">0</div>
  </div>
</div>

<div id="stage-bar-wrap">
  <div id="stage-bar-header">
    <span id="stage-label">STAGE 1 🌿 草原</span>
    <span id="stage-goal-label">0 / 20個</span>
  </div>
  <div id="stage-bar-bg">
    <div id="stage-bar-fill"></div>
  </div>
</div>

<div id="main">
  <div id="board-wrap">
    <canvas id="gameCanvas"></canvas>
    <div id="chain-display"></div>
    <div id="pause-overlay">
      <div class="pause-text">⏸ PAUSE</div>
      <div class="pause-sub">ポーズボタンで再開</div>
    </div>
  </div>
  <div id="side-panel">
    <div class="side-box">
      <div class="side-label">NEXT</div>
      <canvas id="nextCanvas" width="56" height="116"></canvas>
    </div>
    <div class="side-box">
      <div class="side-label">LEVEL</div>
      <div id="level-val">1</div>
    </div>
    <div class="side-box">
      <div class="side-label">消し</div>
      <div id="clear-val" style="font-size:20px;font-weight:900;color:#FF4757;text-shadow:0 0 12px #FF475788;">0</div>
    </div>
  </div>
</div>

<div id="controls">
  <button class="btn" id="btnLeft">◀</button>
  <button class="btn btn-rotate" id="btnRotL">↺</button>
  <button class="btn btn-drop" id="btnDown">▼▼</button>
  <button class="btn btn-rotate" id="btnRotR">↻</button>
  <button class="btn" id="btnRight">▶</button>
</div>

<div id="stage-clear-overlay">
  <div id="stage-clear-inner"></div>
</div>

<div id="overlay">
  <div class="overlay-title" id="overlayTitle">ぷよポップ！</div>
  <div class="overlay-score" id="overlayScore"></div>
  <div class="overlay-hi" id="overlayHi"></div>
  <button class="start-btn" id="startBtn">🎮 STAGE 1 から！</button>
  <div class="rules" style="margin-top:14px;">
    同じ色を4つ以上つなげて消そう！<br>
    連鎖でボーナス ✨ 全8ステージ制覇を目指せ！<br><br>
    🌿草原 → 🏜️砂漠 → 🌊海 → ☁️空<br>
    🌅夕焼け → ⛄雪山 → 🚀宇宙 → 🌋火山
  </div>
</div>

<script>
const COLS = 6, ROWS = 13;
const COLORS = ['#FF4757','#1E90FF','#2ED573','#FFD700','#C44DFF'];
const COLOR_GLOW = ['#FF4757','#1E90FF','#2ED573','#FFD700','#C44DFF'];
const COLOR_NAMES = ['赤','青','緑','黄','紫'];

// ===== ステージ定義 =====
const STAGES = [
  { id:1, name:'草原',   emoji:'🌿', goal:20,  colors:2, fallSpeed:52, bg:'#0a1a0a', grad:'radial-gradient(ellipse at 30% 20%, #1a3a1a 0%, transparent 55%), radial-gradient(ellipse at 70% 80%, #0a2a0a 0%, transparent 55%)', barColor:'linear-gradient(90deg,#2ED573,#88FF44)' },
  { id:2, name:'砂漠',   emoji:'🏜️', goal:30,  colors:3, fallSpeed:48, bg:'#1a1000', grad:'radial-gradient(ellipse at 40% 30%, #3a2800 0%, transparent 55%), radial-gradient(ellipse at 60% 70%, #2a1a00 0%, transparent 55%)', barColor:'linear-gradient(90deg,#FFD700,#FF8C00)' },
  { id:3, name:'海',     emoji:'🌊', goal:40,  colors:3, fallSpeed:44, bg:'#001a2a', grad:'radial-gradient(ellipse at 20% 40%, #002a4a 0%, transparent 55%), radial-gradient(ellipse at 80% 60%, #001a3a 0%, transparent 55%)', barColor:'linear-gradient(90deg,#1E90FF,#00FFCC)' },
  { id:4, name:'空',     emoji:'☁️', goal:50,  colors:3, fallSpeed:40, bg:'#0a0a2a', grad:'radial-gradient(ellipse at 50% 20%, #1a1a4a 0%, transparent 60%), radial-gradient(ellipse at 30% 70%, #0a0a3a 0%, transparent 55%)', barColor:'linear-gradient(90deg,#88AAFF,#CCDDFF)' },
  { id:5, name:'夕焼け', emoji:'🌅', goal:60,  colors:4, fallSpeed:36, bg:'#1a0808', grad:'radial-gradient(ellipse at 50% 10%, #3a1500 0%, transparent 55%), radial-gradient(ellipse at 20% 80%, #2a0a0a 0%, transparent 55%)', barColor:'linear-gradient(90deg,#FF4757,#FF8C00)' },
  { id:6, name:'雪山',   emoji:'⛄', goal:75,  colors:4, fallSpeed:32, bg:'#0a0a1a', grad:'radial-gradient(ellipse at 60% 20%, #1a1a3a 0%, transparent 55%), radial-gradient(ellipse at 30% 70%, #0a1a2a 0%, transparent 55%)', barColor:'linear-gradient(90deg,#AADDFF,#FFFFFF)' },
  { id:7, name:'宇宙',   emoji:'🚀', goal:90,  colors:5, fallSpeed:26, bg:'#000010', grad:'radial-gradient(ellipse at 20% 20%, #100030 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, #000020 0%, transparent 50%)', barColor:'linear-gradient(90deg,#C44DFF,#FF4757)' },
  { id:8, name:'火山',   emoji:'🌋', goal:110, colors:5, fallSpeed:20, bg:'#1a0000', grad:'radial-gradient(ellipse at 50% 80%, #3a0800 0%, transparent 55%), radial-gradient(ellipse at 50% 20%, #1a0000 0%, transparent 55%)', barColor:'linear-gradient(90deg,#FF4757,#FF0000)' },
];

let currentStageIdx = 0;

function getStage() { return STAGES[currentStageIdx]; }

function applyStageTheme(stage) {
  document.body.style.setProperty('--stage-bg', stage.bg);
  document.body.style.setProperty('--stage-grad', stage.grad);
  document.getElementById('stage-label').textContent = `STAGE ${stage.id} ${stage.emoji} ${stage.name}`;
  document.getElementById('stage-bar-fill').style.background = stage.barColor;
  // キャンバス枠色も変化
  const canvas = document.getElementById('gameCanvas');
  canvas.style.borderColor = stage.barColor.includes('2ED573') ? '#2ED573' :
                              stage.barColor.includes('FFD700') ? '#FFD700' :
                              stage.barColor.includes('1E90FF') ? '#1E90FF' :
                              stage.barColor.includes('FF4757') ? '#FF4757' : '#C44DFF';
  updateStageBar(0, stage.goal);
}

function updateStageBar(cleared, goal) {
  const pct = Math.min(100, Math.round(cleared / goal * 100));
  document.getElementById('stage-bar-fill').style.width = pct + '%';
  document.getElementById('stage-goal-label').textContent = `${cleared} / ${goal}個`;
}

let canvas = document.getElementById('gameCanvas');
let ctx = canvas.getContext('2d');
let nextCanvas = document.getElementById('nextCanvas');
let nctx = nextCanvas.getContext('2d');

// セルサイズをキャンバスに合わせて計算
let CELL = 0;

function resize() {
  const boardWrap = document.getElementById('board-wrap');
  const wrapW = boardWrap.clientWidth;
  const wrapH = boardWrap.clientHeight;

  // 幅と高さから収まるセルサイズを計算（小さい方を採用）
  const cellByW = Math.floor(wrapW / COLS);
  const cellByH = Math.floor(wrapH / ROWS);
  CELL = Math.min(cellByW, cellByH);

  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  if (game) drawAll();
}

// ゲーム状態
let game = null;

class PuyoGame {
  constructor(stage) {
    this.stage = stage;
    this.board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    this.score = 0;
    this.cleared = 0;
    this.level = stage.id;
    this.fallTimer = 0;
    this.fallSpeed = stage.fallSpeed;
    this.numColors = stage.colors;
    this.current = null;
    this.next = null;
    this.state = 'falling'; // falling | clearing | gameover | stageclear
    this.chainCount = 0;
    this.animFrames = 0;
    this.clearCells = [];
    this.lastTime = 0;
    this.raf = null;
    this.genNext();
    this.spawnCurrent();
  }

  randColor() {
    return Math.floor(Math.random() * this.numColors) + 1;
  }

  genNext() {
    this.next = [this.randColor(), this.randColor()];
  }

  spawnCurrent() {
    this.current = {
      colors: this.next,
      col: Math.floor(COLS / 2) - 1,
      row: 0,
      rot: 0 // 0=上下, 1=左右(上が左), 2=下上, 3=右左
    };
    this.genNext();
    // スポーン時に重なっていたらゲームオーバー
    const [r1, c1, r2, c2] = this.getPairPos();
    if ((this.board[r1] && this.board[r1][c1]) || (this.board[r2] && this.board[r2][c2])) {
      this.state = 'gameover';
    }
  }

  getPairPos() {
    const {col, row, rot} = this.current;
    let r1=row, c1=col, r2, c2;
    if (rot===0)      { r2=row+1; c2=col; }
    else if (rot===1) { r2=row; c2=col+1; }
    else if (rot===2) { r2=row-1; c2=col; }
    else              { r2=row; c2=col-1; }
    return [r1,c1,r2,c2];
  }

  canPlace(col, row, rot) {
    let c2, r2;
    if (rot===0)      { r2=row+1; c2=col; }
    else if (rot===1) { r2=row; c2=col+1; }
    else if (rot===2) { r2=row-1; c2=col; }
    else              { r2=row; c2=col-1; }
    return this.inBounds(col,row) && this.inBounds(c2,r2) &&
           !this.board[row][col] && !this.board[r2][c2];
  }

  inBounds(c, r) {
    return c>=0 && c<COLS && r>=0 && r<ROWS;
  }

  moveLeft()  { if (this.state!=='falling') return; const {col,row,rot}=this.current; if (this.canPlace(col-1,row,rot)) this.current.col--; }
  moveRight() { if (this.state!=='falling') return; const {col,row,rot}=this.current; if (this.canPlace(col+1,row,rot)) this.current.col++; }

  rotLeft() {
    if (this.state!=='falling') return;
    const {col,row,rot}=this.current;
    const nr = (rot+3)%4;
    if (this.canPlace(col,row,nr)) { this.current.rot=nr; return; }
    // kick
    for (const dc of [-1,1]) {
      if (this.canPlace(col+dc,row,nr)) { this.current.col+=dc; this.current.rot=nr; return; }
    }
  }

  rotRight() {
    if (this.state!=='falling') return;
    const {col,row,rot}=this.current;
    const nr = (rot+1)%4;
    if (this.canPlace(col,row,nr)) { this.current.rot=nr; return; }
    for (const dc of [1,-1]) {
      if (this.canPlace(col+dc,row,nr)) { this.current.col+=dc; this.current.rot=nr; return; }
    }
  }

  softDrop() {
    if (this.state!=='falling') return;
    this.fall();
    this.score += 1;
  }

  fall() {
    const {col,row,rot}=this.current;
    if (this.canPlace(col,row+1,rot)) {
      this.current.row++;
    } else {
      this.lock();
    }
  }

  lock() {
    const [r1,c1,r2,c2] = this.getPairPos();
    if (this.inBounds(c1,r1)) this.board[r1][c1] = this.current.colors[0];
    if (this.inBounds(c2,r2)) this.board[r2][c2] = this.current.colors[1];
    this.applyGravity();
    this.chainCount = 0;
    this.checkClear();
  }

  applyGravity() {
    for (let c=0;c<COLS;c++) {
      let bottom = ROWS-1;
      for (let r=ROWS-1;r>=0;r--) {
        if (this.board[r][c]) {
          this.board[bottom][c] = this.board[r][c];
          if (bottom!==r) this.board[r][c]=0;
          bottom--;
        }
      }
    }
  }

  checkClear() {
    const visited = Array.from({length:ROWS},()=>Array(COLS).fill(false));
    const toDelete = [];

    for (let r=0;r<ROWS;r++) {
      for (let c=0;c<COLS;c++) {
        const color = this.board[r][c];
        if (!color || visited[r][c]) continue;
        // BFS
        const group = [];
        const queue = [[r,c]];
        visited[r][c] = true;
        while (queue.length) {
          const [cr,cc] = queue.shift();
          group.push([cr,cc]);
          for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
            const nr=cr+dr, nc=cc+dc;
            if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]&&this.board[nr][nc]===color) {
              visited[nr][nc]=true;
              queue.push([nr,nc]);
            }
          }
        }
        if (group.length>=4) toDelete.push(...group);
      }
    }

    if (toDelete.length) {
      this.chainCount++;
      this.clearCells = toDelete;
      this.state = 'clearing';
      this.animFrames = 30;
      const chainBonus = this.chainCount * this.chainCount;
      const pts = toDelete.length * 10 * chainBonus;
      this.score += pts;
      this.cleared += toDelete.length;
      showChain(this.chainCount);
      updateUI(this.score, this.cleared, this.level);
      updateStageBar(this.cleared, this.stage.goal);
    } else {
      // ステージクリア判定
      if (this.cleared >= this.stage.goal) {
        this.state = 'stageclear';
        return;
      }
      this.state = 'falling';
      this.spawnCurrent();
    }
  }

  stepClear() {
    this.animFrames--;
    if (this.animFrames <= 0) {
      for (const [r,c] of this.clearCells) this.board[r][c]=0;
      this.clearCells=[];
      this.applyGravity();
      this.checkClear();
    }
  }

  tick() {
    if (this.state==='falling') {
      this.fallTimer++;
      if (this.fallTimer >= this.fallSpeed) {
        this.fallTimer=0;
        this.fall();
      }
    } else if (this.state==='clearing') {
      this.stepClear();
    }
  }
}

// UI更新
function updateUI(score, cleared, level) {
  document.getElementById('scoreVal').textContent = score.toLocaleString();
  document.getElementById('clear-val').textContent = cleared;
  document.getElementById('level-val').textContent = level;
  const hi = Math.max(score, parseInt(localStorage.getItem('puyoHi')||'0'));
  localStorage.setItem('puyoHi', hi);
  document.getElementById('hiVal').textContent = hi.toLocaleString();
}

let chainTimeout = null;
function showChain(n) {
  const el = document.getElementById('chain-display');
  el.textContent = n===1 ? '消し！' : `${n}連鎖！！`;
  el.style.transform = 'translate(-50%,-50%) scale(1.2)';
  clearTimeout(chainTimeout);
  chainTimeout = setTimeout(()=>{
    el.style.transform='translate(-50%,-50%) scale(0)';
  }, 600);
}

// 描画
// colorIdx: 0=赤, 1=青, 2=緑, 3=黄, 4=紫
// face: 'normal' | 'dying'
function drawCell(context, c, r, color, size, glow, alpha=1, scale=1, colorIdx=0, face='normal') {
  const x = c*size + size/2;
  const y = r*size + size/2;
  const radius = size*0.42*scale;

  context.save();
  context.globalAlpha = alpha;

  if (glow) {
    context.shadowColor = color;
    context.shadowBlur = 14;
  }

  // 本体グラデーション
  const grad = context.createRadialGradient(x-radius*0.3, y-radius*0.3, radius*0.1, x, y, radius);
  grad.addColorStop(0, lighten(color, 70));
  grad.addColorStop(0.45, color);
  grad.addColorStop(1, darken(color, 50));

  context.beginPath();
  context.arc(x, y, radius, 0, Math.PI*2);
  context.fillStyle = grad;
  context.fill();

  // 輪郭線（漫画風の太い黒縁）
  context.beginPath();
  context.arc(x, y, radius, 0, Math.PI*2);
  context.strokeStyle = 'rgba(0,0,0,0.55)';
  context.lineWidth = radius * 0.1;
  context.stroke();

  // ハイライト（大きめ楕円）
  context.save();
  context.beginPath();
  context.ellipse(x - radius*0.22, y - radius*0.28, radius*0.32, radius*0.2, -0.4, 0, Math.PI*2);
  context.fillStyle = 'rgba(255,255,255,0.55)';
  context.fill();
  context.restore();

  // ===== キャラクター顔 =====
  context.shadowBlur = 0;
  const s = radius;

  if (face === 'dying') {
    drawFaceDying(context, x, y, s, colorIdx);
  } else {
    drawFaceNormal(context, x, y, s, colorIdx);
  }

  context.restore();
}

// ========== 漫画風パーツ描画ユーティリティ ==========

// 漫画風の太い目（白目＋黒目＋光）
function comicEye(ctx2, ex, ey, rOuter, rInner, pupilColor) {
  // 白目
  ctx2.beginPath();
  ctx2.arc(ex, ey, rOuter, 0, Math.PI*2);
  ctx2.fillStyle = 'white';
  ctx2.fill();
  ctx2.strokeStyle = '#111';
  ctx2.lineWidth = rOuter * 0.18;
  ctx2.stroke();
  // 黒目
  ctx2.beginPath();
  ctx2.arc(ex + rOuter*0.1, ey + rOuter*0.1, rInner, 0, Math.PI*2);
  ctx2.fillStyle = pupilColor || '#111';
  ctx2.fill();
  // キラキラ大
  ctx2.beginPath();
  ctx2.arc(ex - rOuter*0.15, ey - rOuter*0.18, rOuter*0.28, 0, Math.PI*2);
  ctx2.fillStyle = 'white';
  ctx2.fill();
  // キラキラ小
  ctx2.beginPath();
  ctx2.arc(ex + rOuter*0.22, ey - rOuter*0.05, rOuter*0.12, 0, Math.PI*2);
  ctx2.fillStyle = 'white';
  ctx2.fill();
}

// ハート目
function heartEye(ctx2, ex, ey, r) {
  ctx2.save();
  ctx2.fillStyle = '#FF4466';
  ctx2.strokeStyle = '#aa0022';
  ctx2.lineWidth = r * 0.15;
  const size = r * 1.1;
  ctx2.beginPath();
  ctx2.moveTo(ex, ey + size*0.5);
  ctx2.bezierCurveTo(ex - size, ey - size*0.2, ex - size*1.2, ey - size*1.0, ex, ey - size*0.2);
  ctx2.bezierCurveTo(ex + size*1.2, ey - size*1.0, ex + size, ey - size*0.2, ex, ey + size*0.5);
  ctx2.closePath();
  ctx2.fill();
  ctx2.stroke();
  // ハートのキラキラ
  ctx2.fillStyle = 'rgba(255,255,255,0.7)';
  ctx2.beginPath();
  ctx2.ellipse(ex - size*0.3, ey - size*0.3, size*0.22, size*0.14, -0.5, 0, Math.PI*2);
  ctx2.fill();
  ctx2.restore();
}

// 三角形の口（叫び）
function shoutMouth(ctx2, x, my, w, h) {
  ctx2.beginPath();
  ctx2.ellipse(x, my, w, h, 0, 0, Math.PI*2);
  ctx2.fillStyle = '#222';
  ctx2.fill();
  ctx2.strokeStyle = '#111';
  ctx2.lineWidth = w*0.1;
  ctx2.stroke();
  // 歯
  ctx2.fillStyle = 'white';
  ctx2.fillRect(x - w*0.5, my - h*0.15, w*1.0, h*0.4);
}

// にっこり口（漫画風・歯あり）
function bigSmile(ctx2, x, my, w) {
  // 口の外形
  ctx2.beginPath();
  ctx2.moveTo(x - w, my);
  ctx2.quadraticCurveTo(x, my + w*0.7, x + w, my);
  ctx2.lineTo(x + w, my - w*0.05);
  ctx2.quadraticCurveTo(x, my + w*0.4, x - w, my - w*0.05);
  ctx2.closePath();
  ctx2.fillStyle = '#222';
  ctx2.fill();
  // 歯
  ctx2.save();
  ctx2.clip();
  ctx2.fillStyle = 'white';
  ctx2.fillRect(x - w, my - w*0.05, w*2, w*0.38);
  ctx2.restore();
  // 口角
  ctx2.strokeStyle = '#111';
  ctx2.lineWidth = w*0.13;
  ctx2.lineCap = 'round';
  ctx2.beginPath();
  ctx2.moveTo(x - w, my);
  ctx2.quadraticCurveTo(x, my + w*0.7, x + w, my);
  ctx2.stroke();
}

// への字口
function sadMouth(ctx2, x, my, w) {
  ctx2.beginPath();
  ctx2.moveTo(x - w, my + w*0.3);
  ctx2.quadraticCurveTo(x, my - w*0.2, x + w, my + w*0.3);
  ctx2.strokeStyle = '#222';
  ctx2.lineWidth = w * 0.22;
  ctx2.lineCap = 'round';
  ctx2.stroke();
}

// 漫画風眉毛
function comicBrow(ctx2, ex, ey, w, angle, col) {
  ctx2.save();
  ctx2.translate(ex, ey);
  ctx2.rotate(angle);
  ctx2.beginPath();
  ctx2.moveTo(-w*0.6, 0);
  ctx2.quadraticCurveTo(0, -w*0.25, w*0.6, 0);
  ctx2.strokeStyle = col || '#222';
  ctx2.lineWidth = w * 0.28;
  ctx2.lineCap = 'round';
  ctx2.stroke();
  ctx2.restore();
}

// ほっぺ（漫画風・斜線3本）
function comicCheek(ctx2, cx, cy, s, col) {
  ctx2.save();
  ctx2.globalAlpha *= 0.7;
  // 楕円ベース
  ctx2.beginPath();
  ctx2.ellipse(cx, cy, s*0.19, s*0.12, 0, 0, Math.PI*2);
  ctx2.fillStyle = col;
  ctx2.fill();
  // 斜線
  ctx2.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx2.lineWidth = s*0.025;
  ctx2.lineCap = 'round';
  for (let i=-1;i<=1;i++) {
    ctx2.beginPath();
    ctx2.moveTo(cx + i*s*0.065 - s*0.06, cy - s*0.04);
    ctx2.lineTo(cx + i*s*0.065 + s*0.06, cy + s*0.04);
    ctx2.stroke();
  }
  ctx2.restore();
}

// 汗マーク（漫画風）
function comicSweat(ctx2, sx, sy, s) {
  ctx2.save();
  // 青い水滴
  ctx2.fillStyle = '#55CCFF';
  ctx2.strokeStyle = '#1188BB';
  ctx2.lineWidth = s*0.05;
  ctx2.beginPath();
  ctx2.arc(sx, sy + s*0.12, s*0.1, 0, Math.PI*2);
  ctx2.fill(); ctx2.stroke();
  ctx2.beginPath();
  ctx2.moveTo(sx - s*0.07, sy + s*0.12);
  ctx2.quadraticCurveTo(sx - s*0.02, sy - s*0.06, sx + s*0.04, sy);
  ctx2.quadraticCurveTo(sx + s*0.1, sy + s*0.06, sx + s*0.07, sy + s*0.12);
  ctx2.fillStyle = '#55CCFF';
  ctx2.fill(); ctx2.stroke();
  ctx2.restore();
}

// ======== 色ごとの通常顔（漫画風） ========
function drawFaceNormal(ctx2, x, y, s, idx) {
  ctx2.save();
  ctx2.shadowBlur = 0;

  const eY  = y - s*0.1;
  const eSpread = s*0.27;
  const eR  = s*0.155;

  if (idx === 0) {
    // 🔴 赤：元気・ドヤ顔。大きな白目、太い眉、大きな笑顔
    comicBrow(ctx2, x - eSpread, eY - s*0.28, eR, -0.15, '#222');
    comicBrow(ctx2, x + eSpread, eY - s*0.28, eR,  0.15, '#222');
    comicEye(ctx2, x - eSpread, eY, eR, eR*0.55, '#111');
    comicEye(ctx2, x + eSpread, eY, eR, eR*0.55, '#111');
    bigSmile(ctx2, x, y + s*0.17, s*0.32);
    comicCheek(ctx2, x - s*0.42, y + s*0.08, s, '#FF7799');
    comicCheek(ctx2, x + s*0.42, y + s*0.08, s, '#FF7799');

  } else if (idx === 1) {
    // 🔵 青：おっとり・たれ目。目が下がり気味、ゆる笑顔
    // たれ目（白目+黒目、上がclip）
    for (const ex of [x - eSpread, x + eSpread]) {
      // 白目（少し縦長だれ目型）
      ctx2.save();
      ctx2.beginPath();
      ctx2.ellipse(ex, eY + eR*0.15, eR, eR*0.78, 0, 0, Math.PI*2);
      ctx2.fillStyle = 'white';
      ctx2.fill();
      ctx2.strokeStyle = '#111';
      ctx2.lineWidth = eR*0.18;
      ctx2.stroke();
      // 黒目
      ctx2.beginPath();
      ctx2.arc(ex + eR*0.08, eY + eR*0.3, eR*0.42, 0, Math.PI*2);
      ctx2.fillStyle = '#2244AA';
      ctx2.fill();
      // キラキラ
      ctx2.beginPath();
      ctx2.arc(ex - eR*0.12, eY + eR*0.1, eR*0.22, 0, Math.PI*2);
      ctx2.fillStyle = 'white'; ctx2.fill();
      // たれ眉
      ctx2.beginPath();
      ctx2.moveTo(ex - eR*0.7, eY - eR*0.85);
      ctx2.quadraticCurveTo(ex, eY - eR*1.05, ex + eR*0.7, eY - eR*0.72);
      ctx2.strokeStyle = '#333'; ctx2.lineWidth = eR*0.25; ctx2.lineCap='round';
      ctx2.stroke();
      ctx2.restore();
    }
    // ゆる口
    ctx2.beginPath();
    ctx2.moveTo(x - s*0.22, y + s*0.22);
    ctx2.quadraticCurveTo(x, y + s*0.34, x + s*0.22, y + s*0.22);
    ctx2.strokeStyle = '#222'; ctx2.lineWidth = s*0.07; ctx2.lineCap='round';
    ctx2.stroke();
    comicCheek(ctx2, x - s*0.44, y + s*0.12, s, '#88AAFF');
    comicCheek(ctx2, x + s*0.44, y + s*0.12, s, '#88AAFF');

  } else if (idx === 2) {
    // 🟢 緑：満面の笑み。目が細いへの字＋大笑い
    // への字目（U字反転）
    for (const ex of [x - eSpread, x + eSpread]) {
      ctx2.beginPath();
      ctx2.arc(ex, eY + eR*0.5, eR*0.72, Math.PI, 0);
      ctx2.strokeStyle = '#111';
      ctx2.lineWidth = eR*0.38;
      ctx2.lineCap = 'round';
      ctx2.stroke();
      // まつ毛
      ctx2.beginPath();
      ctx2.moveTo(ex - eR*0.65, eY + eR*0.5);
      ctx2.lineTo(ex - eR*1.0, eY + eR*0.1);
      ctx2.moveTo(ex + eR*0.65, eY + eR*0.5);
      ctx2.lineTo(ex + eR*1.0, eY + eR*0.1);
      ctx2.strokeStyle = '#111'; ctx2.lineWidth = eR*0.2;
      ctx2.stroke();
    }
    bigSmile(ctx2, x, y + s*0.15, s*0.35);
    comicCheek(ctx2, x - s*0.44, y + s*0.06, s, '#44DD88');
    comicCheek(ctx2, x + s*0.44, y + s*0.06, s, '#44DD88');

  } else if (idx === 3) {
    // 🟡 黄：びっくり！目がまん丸で大きい、口が叫び
    // ビックリ眉
    comicBrow(ctx2, x - eSpread, eY - s*0.32, eR*1.1, 0.35, '#222');
    comicBrow(ctx2, x + eSpread, eY - s*0.32, eR*1.1, -0.35, '#222');
    // 大きな白目
    comicEye(ctx2, x - eSpread, eY, eR*1.28, eR*0.68, '#222');
    comicEye(ctx2, x + eSpread, eY, eR*1.28, eR*0.68, '#222');
    // 叫び口
    shoutMouth(ctx2, x, y + s*0.24, s*0.2, s*0.14);

  } else {
    // 🟣 紫：眠そう・うとうと。半眼＋ハート
    // 半眼（上半分だけ目）
    for (const ex of [x - eSpread, x + eSpread]) {
      ctx2.save();
      ctx2.beginPath();
      ctx2.ellipse(ex, eY, eR, eR*0.8, 0, 0, Math.PI*2);
      ctx2.clip();
      // 下半分だけ白目
      ctx2.fillStyle = 'white';
      ctx2.fillRect(ex - eR*1.5, eY, eR*3, eR*2);
      ctx2.strokeStyle = '#111'; ctx2.lineWidth = eR*0.15;
      // まぶた線
      ctx2.beginPath();
      ctx2.moveTo(ex - eR, eY);
      ctx2.lineTo(ex + eR, eY);
      ctx2.stroke();
      // 黒目（下よりに）
      ctx2.beginPath();
      ctx2.arc(ex, eY + eR*0.35, eR*0.38, 0, Math.PI*2);
      ctx2.fillStyle = '#330055'; ctx2.fill();
      // キラキラ
      ctx2.beginPath();
      ctx2.arc(ex - eR*0.15, eY + eR*0.18, eR*0.14, 0, Math.PI*2);
      ctx2.fillStyle = 'white'; ctx2.fill();
      ctx2.restore();
      // まぶた輪郭
      ctx2.beginPath();
      ctx2.ellipse(ex, eY, eR, eR*0.8, 0, 0, Math.PI*2);
      ctx2.strokeStyle = '#222'; ctx2.lineWidth = eR*0.18;
      ctx2.stroke();
    }
    // ハート口
    heartEye(ctx2, x, y + s*0.28, s*0.12);
    comicCheek(ctx2, x - s*0.44, y + s*0.1, s, '#CC66FF');
    comicCheek(ctx2, x + s*0.44, y + s*0.1, s, '#CC66FF');
  }

  ctx2.restore();
}

// ======== 消えるとき：漫画風パニック顔 ========
function drawFaceDying(ctx2, x, y, s, idx) {
  ctx2.save();
  ctx2.shadowBlur = 0;

  const eY = y - s*0.1;
  const eSpread = s*0.27;
  const eR = s*0.155;

  // ガクガク眉（困り）
  const browAngle = 0.45;
  comicBrow(ctx2, x - eSpread, eY - s*0.28, eR, browAngle, '#333');
  comicBrow(ctx2, x + eSpread, eY - s*0.28, eR, -browAngle, '#333');

  // ×目（漫画風・太くくっきり）
  for (const ex of [x - eSpread, x + eSpread]) {
    // 白目の輪
    ctx2.beginPath();
    ctx2.arc(ex, eY, eR, 0, Math.PI*2);
    ctx2.fillStyle = 'white';
    ctx2.fill();
    ctx2.strokeStyle = '#111';
    ctx2.lineWidth = eR*0.18;
    ctx2.stroke();
    // ×線
    const er = eR * 0.62;
    ctx2.strokeStyle = '#CC0000';
    ctx2.lineWidth = eR * 0.32;
    ctx2.lineCap = 'round';
    ctx2.beginPath(); ctx2.moveTo(ex-er, eY-er); ctx2.lineTo(ex+er, eY+er); ctx2.stroke();
    ctx2.beginPath(); ctx2.moveTo(ex+er, eY-er); ctx2.lineTo(ex-er, eY+er); ctx2.stroke();
  }

  // 波線口（ガタガタ震え）
  ctx2.beginPath();
  ctx2.moveTo(x - s*0.28, y + s*0.26);
  for (let i=0;i<5;i++) {
    const px = x - s*0.28 + i*(s*0.56/4);
    const py = y + s*0.26 + (i%2===0 ? s*0.06 : -s*0.06);
    ctx2.lineTo(px + s*0.07, py);
  }
  ctx2.lineTo(x + s*0.28, y + s*0.26);
  ctx2.strokeStyle = '#222';
  ctx2.lineWidth = s*0.09;
  ctx2.lineCap = 'round';
  ctx2.lineJoin = 'round';
  ctx2.stroke();

  // 汗×2
  comicSweat(ctx2, x + s*0.58, eY - s*0.1, s);
  comicSweat(ctx2, x - s*0.62, eY + s*0.05, s*0.8);

  ctx2.restore();
}

function drawEyes(ctx2, x, ey, spread, r, col, shine) {
  for (const ex of [x-spread, x+spread]) {
    ctx2.beginPath();
    ctx2.arc(ex, ey, r, 0, Math.PI*2);
    ctx2.fillStyle = col;
    ctx2.fill();
    if (shine) {
      ctx2.beginPath();
      ctx2.arc(ex+r*0.3, ey-r*0.3, r*0.32, 0, Math.PI*2);
      ctx2.fillStyle = 'white';
      ctx2.fill();
    }
  }
}

function drawEyesHalf(ctx2, x, ey, spread, r, col) {
  for (const ex of [x-spread, x+spread]) {
    ctx2.fillStyle = col;
    ctx2.beginPath();
    ctx2.arc(ex, ey, r, Math.PI, 0);
    ctx2.fill();
    ctx2.fillStyle = 'white';
    ctx2.beginPath();
    ctx2.arc(ex, ey+r*0.1, r*0.85, Math.PI, 0);
    ctx2.fill();
  }
}

function drawEyesCrescent(ctx2, x, ey, spread, r) {
  for (const ex of [x-spread, x+spread]) {
    ctx2.fillStyle = '#333';
    ctx2.beginPath();
    ctx2.arc(ex, ey, r, Math.PI, 0);
    ctx2.fill();
  }
}

function drawEyesSleepy(ctx2, x, ey, spread, r) {
  ctx2.strokeStyle = '#333';
  ctx2.lineWidth = r*0.7;
  ctx2.lineCap = 'round';
  for (const ex of [x-spread, x+spread]) {
    ctx2.beginPath();
    ctx2.moveTo(ex-r*0.8, ey);
    ctx2.lineTo(ex+r*0.8, ey);
    ctx2.stroke();
  }
}

function drawSmile(ctx2, x, my, w, sad) {
  ctx2.beginPath();
  if (sad) {
    ctx2.moveTo(x-w, my);
    ctx2.quadraticCurveTo(x, my-w*0.6, x+w, my);
  } else {
    ctx2.moveTo(x-w, my);
    ctx2.quadraticCurveTo(x, my+w*0.6, x+w, my);
  }
  ctx2.strokeStyle = '#333';
  ctx2.lineWidth = w*0.18;
  ctx2.lineCap = 'round';
  ctx2.stroke();
}

function drawSmileGentle(ctx2, x, my, w) {
  ctx2.beginPath();
  ctx2.moveTo(x-w, my);
  ctx2.quadraticCurveTo(x, my+w*0.4, x+w, my);
  ctx2.strokeStyle = '#333';
  ctx2.lineWidth = w*0.18;
  ctx2.lineCap = 'round';
  ctx2.stroke();
}

function drawCheeks(ctx2, x, cy, s, col) {
  ctx2.globalAlpha *= 0.45;
  for (const cx of [x - s*0.38, x + s*0.38]) {
    ctx2.beginPath();
    ctx2.ellipse(cx, cy, s*0.16, s*0.1, 0, 0, Math.PI*2);
    ctx2.fillStyle = col;
    ctx2.fill();
  }
  ctx2.globalAlpha /= 0.45;
}

function lighten(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-amt); g=Math.max(0,g-amt); b=Math.max(0,b-amt);
  return `rgb(${r},${g},${b})`;
}

function drawAll() {
  if (!game || !CELL) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // グリッド背景
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      ctx.fillStyle = (r+c)%2===0 ? '#12123080' : '#0e0e2880';
      ctx.beginPath();
      ctx.roundRect(c*CELL+1, r*CELL+1, CELL-2, CELL-2, 4);
      ctx.fill();
    }
  }

  // ボード
  const flashPhase = game.animFrames % 6 < 3;
  const clearSet = new Set(game.clearCells.map(([r,c])=>`${r},${c}`));

  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const color = game.board[r][c];
      if (color) {
        const isClear = clearSet.has(`${r},${c}`);
        if (isClear && !flashPhase) continue;
        const scale = isClear ? 1.1 : 1;
        const alpha = isClear ? (flashPhase ? 1 : 0.4) : 1;
        const face = isClear ? 'dying' : 'normal';
        drawCell(ctx, c, r, COLORS[color-1], CELL, !isClear, alpha, scale, color-1, face);
      }
    }
  }

  // 落下中のぷよ
  if (game.current && game.state==='falling') {
    const [r1,c1,r2,c2] = game.getPairPos();
    // ゴーストを描く
    let ghostRow = game.current.row;
    while (game.canPlace(game.current.col, ghostRow+1, game.current.rot)) ghostRow++;
    const ghostDiff = ghostRow - game.current.row;
    const [gr1,gc1,gr2,gc2] = [r1+ghostDiff, c1, r2+ghostDiff, c2];
    if (game.inBounds(gc1,gr1)) drawCell(ctx, gc1, gr1, COLORS[game.current.colors[0]-1], CELL, false, 0.2, 1, game.current.colors[0]-1, 'normal');
    if (game.inBounds(gc2,gr2)) drawCell(ctx, gc2, gr2, COLORS[game.current.colors[1]-1], CELL, false, 0.2, 1, game.current.colors[1]-1, 'normal');
    // 実際のぷよ
    if (game.inBounds(c1,r1)) drawCell(ctx, c1, r1, COLORS[game.current.colors[0]-1], CELL, true, 1, 1, game.current.colors[0]-1, 'normal');
    if (game.inBounds(c2,r2)) drawCell(ctx, c2, r2, COLORS[game.current.colors[1]-1], CELL, true, 1, 1, game.current.colors[1]-1, 'normal');
  }

  drawNext();
}

function drawNext() {
  nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  if (!game || !game.next) return;
  const s = 52;
  drawCell(nctx, 0, 0, COLORS[game.next[0]-1], s, true, 1, 1, game.next[0]-1, 'normal');
  drawCell(nctx, 0, 1, COLORS[game.next[1]-1], s, true, 1, 1, game.next[1]-1, 'normal');
}

// ゲームループ
let lastTick = 0;
let paused = false;

function gameLoop(ts) {
  if (!game) return;
  if (game.state==='gameover') { endGame(); return; }
  if (game.state==='stageclear') { showStageClear(); return; }
  if (paused) return;
  if (ts - lastTick >= 16) {
    game.tick();
    drawAll();
    lastTick = ts;
  }
  requestAnimationFrame(gameLoop);
}

function startGame(fromStage = 0) {
  currentStageIdx = fromStage;
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('stage-clear-overlay').classList.remove('visible');
  paused = false;
  document.getElementById('pauseBtn').textContent = '⏸ ポーズ';
  document.getElementById('pauseBtn').classList.remove('paused');
  document.getElementById('pause-overlay').classList.remove('visible');
  const stage = getStage();
  applyStageTheme(stage);
  game = new PuyoGame(stage);
  updateUI(0, 0, stage.id);
  document.getElementById('hiVal').textContent = (localStorage.getItem('puyoHi')||'0');
  lastTick = 0;
  requestAnimationFrame(gameLoop);
}

function showStageClear() {
  const stage = getStage();
  const isLast = currentStageIdx >= STAGES.length - 1;
  const inner = document.getElementById('stage-clear-inner');

  if (isLast) {
    inner.innerHTML = `
      <div class="all-clear-title">🎉 全ステージクリア！！ 🎉</div>
      <div class="stage-next-info" style="margin-bottom:6px;">スコア: ${game.score.toLocaleString()}</div>
      <div class="stage-next-theme" style="font-size:18px;color:#aaaacc;">全8ステージ制覇おめでとう！</div>
      <button class="stage-next-btn" onclick="startGame(0)" style="background:linear-gradient(135deg,#FF4757,#C44DFF)">🔄 最初から</button>
    `;
  } else {
    const next = STAGES[currentStageIdx + 1];
    inner.innerHTML = `
      <div class="stage-clear-title">✨ STAGE ${stage.id} クリア！</div>
      <div class="stage-next-info">NEXT STAGE</div>
      <div class="stage-next-theme">${next.emoji} ${next.name}</div>
      <div style="font-size:13px;color:#8888cc;margin-bottom:18px;font-weight:700;">目標: ${next.goal}個 / 色数: ${next.colors}色</div>
      <button class="stage-next-btn" id="nextStageBtn">▶ 次のステージへ</button>
    `;
    document.getElementById('nextStageBtn').addEventListener('click', ()=>startGame(currentStageIdx+1));
    document.getElementById('nextStageBtn').addEventListener('touchstart', e=>{ e.preventDefault(); startGame(currentStageIdx+1); }, {passive:false});
  }

  // ハイスコア保存
  const hi = parseInt(localStorage.getItem('puyoHi')||'0');
  if (game.score > hi) localStorage.setItem('puyoHi', game.score);
  document.getElementById('hiVal').textContent = Math.max(hi, game.score).toLocaleString();

  document.getElementById('stage-clear-overlay').classList.add('visible');
}

function endGame() {
  const hi = parseInt(localStorage.getItem('puyoHi')||'0');
  const isNew = game.score >= hi && game.score > 0;
  if (isNew) localStorage.setItem('puyoHi', game.score);
  const stage = getStage();

  document.getElementById('overlayTitle').textContent = 'ゲームオーバー';
  document.getElementById('overlayScore').textContent = `スコア: ${game.score.toLocaleString()}`;
  document.getElementById('overlayHi').textContent = isNew ? '🏆 新記録！' : `ハイスコア: ${Math.max(hi, game.score).toLocaleString()}`;
  document.getElementById('startBtn').textContent = '🔄 もう一度！';
  document.getElementById('startBtn').onclick = ()=>startGame(currentStageIdx);
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('hiVal').textContent = Math.max(hi, game.score).toLocaleString();
}

// ボタン操作
function addBtn(id, fn) {
  const el = document.getElementById(id);
  let interval = null;
  el.addEventListener('touchstart', e=>{ e.preventDefault(); fn(); interval=setInterval(fn,100); }, {passive:false});
  el.addEventListener('touchend', ()=>clearInterval(interval));
  el.addEventListener('mousedown', ()=>{ fn(); interval=setInterval(fn,100); });
  el.addEventListener('mouseup', ()=>clearInterval(interval));
}

addBtn('btnLeft',  ()=>game&&game.moveLeft());
addBtn('btnRight', ()=>game&&game.moveRight());
addBtn('btnDown',  ()=>game&&game.softDrop());

document.getElementById('btnRotL').addEventListener('touchstart', e=>{ e.preventDefault(); game&&game.rotLeft(); }, {passive:false});
document.getElementById('btnRotL').addEventListener('click', ()=>game&&game.rotLeft());
document.getElementById('btnRotR').addEventListener('touchstart', e=>{ e.preventDefault(); game&&game.rotRight(); }, {passive:false});
document.getElementById('btnRotR').addEventListener('click', ()=>game&&game.rotRight());

// キーボード操作
document.addEventListener('keydown', e=>{
  if (!game) return;
  if (e.key==='Escape'||e.key==='p'||e.key==='P') { togglePause(); return; }
  if (paused) return;
  if (e.key==='ArrowLeft')  { e.preventDefault(); game.moveLeft(); }
  if (e.key==='ArrowRight') { e.preventDefault(); game.moveRight(); }
  if (e.key==='ArrowDown')  { e.preventDefault(); game.softDrop(); }
  if (e.key==='ArrowUp')    { e.preventDefault(); game.rotRight(); }
  if (e.key==='z'||e.key==='Z') game.rotLeft();
  if (e.key==='x'||e.key==='X') game.rotRight();
});

document.getElementById('startBtn').addEventListener('click', ()=>startGame(0));

// 初期テーマ適用
applyStageTheme(STAGES[0]);

// ポーズ
function togglePause() {
  if (!game || game.state==='gameover') return;
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  const po = document.getElementById('pause-overlay');
  if (paused) {
    btn.textContent = '▶ 再開';
    btn.classList.add('paused');
    po.classList.add('visible');
  } else {
    btn.textContent = '⏸ ポーズ';
    btn.classList.remove('paused');
    po.classList.remove('visible');
    lastTick = 0;
    requestAnimationFrame(gameLoop);
  }
}

document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('pauseBtn').addEventListener('touchstart', e=>{ e.preventDefault(); togglePause(); }, {passive:false});

// スワイプ操作
let touchStartX=0, touchStartY=0, touchHandled=false;
canvas.addEventListener('touchstart', e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchHandled=false;
}, {passive:true});

canvas.addEventListener('touchmove', e=>{
  if (touchHandled||!game) return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if (Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)) {
    touchHandled=true;
    dx>0?game.moveRight():game.moveLeft();
  } else if (dy>24&&Math.abs(dy)>Math.abs(dx)) {
    touchHandled=true;
    game.softDrop();
  }
}, {passive:true});

canvas.addEventListener('touchend', e=>{
  if (!touchHandled&&game) {
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    if (Math.abs(dx)<10&&Math.abs(dy)<10) game.rotRight();
  }
});

// ハイスコア表示
document.getElementById('hiVal').textContent = (localStorage.getItem('puyoHi')||'0');
document.getElementById('overlayScore').textContent = '';
document.getElementById('overlayHi').textContent = '';

window.addEventListener('resize', resize);
resize();
</script>
